  h1,h2,h3,.font-display{font-family:'Poppins',sans-serif;}
  #app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Header ---------- */
  header.site-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px;
    max-width:1080px;margin:0 auto;width:100%;
  }
  .logo-wrap{display:flex;align-items:center;gap:10px;}
  .logo-badge{
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(145deg,var(--sky),var(--sky-deep));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(79,168,214,0.4);
    flex-shrink:0;
  }
  .logo-text{font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.02em;color:var(--sky-ink);line-height:1.15;}
  .logo-text span{display:block;font-size:10px;font-weight:500;color:var(--sky-ink-soft);letter-spacing:0.08em;}
  .admin-link{
    font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
    color:var(--sky-ink-soft);background:rgba(255,255,255,0.7);
    border:1px solid var(--line);padding:8px 14px;border-radius:999px;
    cursor:pointer;transition:all .25s ease;display:flex;align-items:center;gap:6px;
  }
  .admin-link:hover{background:var(--white);box-shadow:var(--shadow-soft);transform:translateY(-1px);}

  /* ---------- Hero ---------- */
  .hero{
    text-align:center;padding:10px 20px 8px;max-width:640px;margin:0 auto;width:100%;
  }
  .shuttle-hero{width:74px;height:auto;margin:0 auto 14px;animation:floatShuttle 3.6s ease-in-out infinite;filter:drop-shadow(0 10px 16px rgba(79,168,214,0.35));}
  @keyframes floatShuttle{
    0%,100%{transform:translateY(0) rotate(-6deg);}
    50%{transform:translateY(-10px) rotate(4deg);}
  }
  .hero h1{
    font-size:clamp(24px,6vw,36px);font-weight:800;letter-spacing:0.01em;

/* ============ Storage layer (Google Sheets via Apps Script) ============ */
// GANTI URL DI BAWAH INI dengan URL Web App hasil Deploy Apps Script kamu.
// Contoh: 'https://script.google.com/macros/s/AKfycb..../exec'
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPnmhSvTt7hg6QDMN2G0Pe2fyj-A73c7tvBkmQhv2cz1wk46tYC9PnUABpxF4pdPAotw/exec';

const ADMIN_CODE = 'SBC159'; 
const MAX_VISIT_LOGS = 1000;

function isConfigured(){
  return APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('script.google.com') > -1;
}

async function apiGet(action, extraParams){
  const params = new URLSearchParams({ action, ...extraParams });
  const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
  return res.json();
}
async function apiPost(payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari CORS preflight
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function loadAllData(){
  if(!isConfigured()) return { registrations: [], visits: [] };
  try{
    const data = await apiGet('list', { token: ADMIN_CODE });
    if(data.error) { console.error(data.error); return { registrations: [], visits: [] }; }
    const registrations = (data.registrations || []).map(r => ({
      id: r.ID, nama: r.Nama, hp: String(r['Nomor HP']), tanggal: r.Tanggal, jam: r.Jam
    }));
    const visits = (data.visits || []).map(v => ({
      id: v.ID, tanggal: v.Tanggal, jam: v.Jam, device: v.Perangkat, browser: v.Browser
    }));
    return { registrations, visits };
  }catch(e){ console.error('Gagal memuat data', e); return { registrations: [], visits: [] }; }
}

async function addRegistration(nama, hp){
  const { tanggal, jam } = nowParts();
  const id = genId();
  try{
    const res = await apiPost({ action:'addRegistration', id, nama, hp, tanggal, jam });
    return !res.error;
  }catch(e){ console.error(e); return false; }
}

async function updateRegistration(id, nama, hp){
  try{
    const res = await apiPost({ action:'updateRegistration', id, nama, hp, token: ADMIN_CODE });
    return !!res.success;
  }catch(e){ console.error(e); return false; }
}

async function deleteRegistration(id){
  try{
    const res = await apiPost({ action:'deleteRegistration', id, token: ADMIN_CODE });
    return !!res.success;
  }catch(e){ console.error(e); return false; }
}

async function clearVisitLogs(){
  try{
    const res = await apiPost({ action:'clearVisits', token: ADMIN_CODE });
    return !!res.success;
  }catch(e){ console.error(e); return false; }
}

function detectDevice(){
  const ua = navigator.userAgent || '';
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua);
  let browser = 'Lainnya';
  if(/Edg\//.test(ua)) browser = 'Edge';
  else if(/OPR\//.test(ua)) browser = 'Opera';
  else if(/Chrome\//.test(ua) && !/Chromium/.test(ua)) browser = 'Chrome';
  else if(/Firefox\//.test(ua)) browser = 'Firefox';
  else if(/Safari\//.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  return { device: isMobile ? 'Mobile' : 'Desktop', browser };
}
async function logVisit(){
  if(!isConfigured()) return;
  try{
    const { tanggal, jam } = nowParts();
    const { device, browser } = detectDevice();
    const id = 'V-' + Date.now().toString().slice(-9);
    await apiPost({ action:'addVisit', id, tanggal, jam, device, browser });
  }catch(e){ console.error('Gagal mencatat kunjungan', e); }
}

function genId(){
  return 'SBC-' + Date.now().toString().slice(-8);
}
function nowParts(){
  const d = new Date();
  const tanggal = d.toLocaleDateString('id-ID', {day:'2-digit',month:'2-digit',year:'numeric'});
  const jam = d.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  return {tanggal, jam};
}

          </div>
          <div class="field" id="fHpWrap">
            <label for="fHp">Nomor HP (WhatsApp)</label>
            <input type="tel" id="fHp" placeholder="Contoh: 081234567890" inputmode="numeric" autocomplete="tel">
            <div class="err-msg" id="fHpErr">Nomor HP wajib diisi (10–15 digit angka).</div>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">
            <span class="btn-label">DAFTAR SEKARANG</span>

      <span class="foot-admin" id="goAdminBtn2">Dashboard Admin</span>
    </footer>

    <div class="overlay" id="successOverlay">
      <div class="modal">
        <div class="check-badge">${svgCheck}</div>
        <h3>Pendaftaran Berhasil</h3>
        <p>Pendaftaran berhasil.<br>Terima kasih telah mendaftar di Salis Badminton Club.</p>
        <button id="closeModalBtn">Tutup</button>
      </div>
    </div>
  `;

  document.getElementById('goAdminBtn').onclick = () => { currentView = adminAuthed ? 'admin' : 'gate'; render(); };
  document.getElementById('goAdminBtn2').onclick = () => { currentView = adminAuthed ? 'admin' : 'gate'; render(); };

  const form = document.getElementById('regForm');
  const namaInput = document.getElementById('fNama');
  const hpInput = document.getElementById('fHp');
  const namaWrap = document.getElementById('fNamaWrap');
  const hpWrap = document.getElementById('fHpWrap');
  const hpErr = document.getElementById('fHpErr');
  const submitBtn = document.getElementById('submitBtn');
  const overlay = document.getElementById('successOverlay');

  hpInput.addEventListener('input', () => {
    hpInput.value = hpInput.value.replace(/[^0-9]/g, '');
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let valid = true;

    const nama = namaInput.value.trim();
    if(!nama){
      namaWrap.classList.add('invalid'); namaInput.classList.add('err'); valid = false;
    }else{
      namaWrap.classList.remove('invalid'); namaInput.classList.remove('err');
    }

    const hp = hpInput.value.trim();
    if(!hp){
      hpErr.textContent = 'Nomor HP wajib diisi.';
      hpWrap.classList.add('invalid'); hpInput.classList.add('err'); valid = false;
    }else if(!/^[0-9]+$/.test(hp)){
      hpErr.textContent = 'Nomor HP hanya boleh berupa angka.';
      hpWrap.classList.add('invalid'); hpInput.classList.add('err'); valid = false;
    }else if(hp.length < 10 || hp.length > 15){
      hpErr.textContent = 'Nomor HP harus 10–15 digit.';
      hpWrap.classList.add('invalid'); hpInput.classList.add('err'); valid = false;
    }else{
      hpWrap.classList.remove('invalid'); hpInput.classList.remove('err');
    }

    if(!valid) return;

    if(!isConfigured()){
      alert('Formulir belum terhubung ke database. Hubungi admin untuk melengkapi konfigurasi APPS_SCRIPT_URL.');
      return;
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    setTimeout(async () => {
      const ok = await addRegistration(nama, hp);
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
      if(ok){
        form.reset();
        overlay.classList.add('show');
      }else{
        alert('Terjadi kesalahan saat menyimpan data. Silakan coba lagi.');
      }
    }, 1100);
  });

  document.getElementById('closeModalBtn').onclick = () => overlay.classList.remove('show');
  overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.remove('show'); });
}

/* ============ ADMIN DASHBOARD ============ */
async function renderAdmin(){
  const { registrations: all, visits } = await loadAllData();

  const filtered = all.filter(r => {
    const okNama = (r.nama || '').toLowerCase().includes(searchNama.toLowerCase());
    const okHp = (r.hp || '').includes(searchHp);
    return okNama && okHp;
  }).reverse();

  const visitsSorted = visits.slice().reverse();

  app.innerHTML = `
    <div class="admin-wrap">
      <div class="admin-top">
        <button class="back-btn" id="backFormBtn">${svgArrowLeft} Kembali ke Formulir</button>
        <div class="admin-title">Dashboard Admin</div>
      </div>

      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-icon">${svgUsers}</div>
          <div>
            <div class="stat-num">${all.length}</div>
            <div class="stat-label">Total Pendaftar (Isi Form)</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon alt">${svgUsers}</div>
          <div>
            <div class="stat-num">${visits.length}</div>
            <div class="stat-label">Total Kunjungan Halaman</div>
          </div>
        </div>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab ${adminTab==='daftar'?'active':''}" id="tabDaftar">Data Pendaftar</button>
        <button class="admin-tab ${adminTab==='kunjungan'?'active':''}" id="tabKunjungan">Log Kunjungan</button>
      </div>

      ${adminTab === 'daftar' ? `
        <div class="toolbar">
          <input type="text" id="searchNama" placeholder="Cari Nama..." value="${escapeHtml(searchNama)}">
          <input type="text" id="searchHp" placeholder="Cari Nomor HP..." value="${escapeHtml(searchHp)}" inputmode="numeric">
          <button class="btn-export" id="exportBtn">${svgDownload} Download Data Excel</button>
        </div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <thead>
                <tr><th>ID</th><th>Nama</th><th>Nomor HP</th><th>Tanggal</th><th>Jam</th><th>Aksi</th></tr>
              </thead>
              <tbody id="tbody">
                ${filtered.length === 0 ? '' : filtered.map(r => rowHtml(r)).join('')}
              </tbody>
            </table>
          </div>
          ${filtered.length === 0 ? `<div class="empty-state">Belum ada data pendaftar${(searchNama||searchHp) ? ' yang cocok dengan pencarian.' : '.'}</div>` : ''}
        </div>
      ` : `
        <p class="privacy-note">Log ini mencatat kapan halaman formulir dibuka, beserta jenis perangkat &amp; browser secara anonim (tidak ada nama/identitas pribadi selama pengunjung belum submit form).</p>
        <div class="toolbar">
          <div style="flex:1;"></div>
          <button class="btn-clear-log" id="clearLogBtn">${svgTrash} Hapus Semua Log</button>
        </div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <thead>
                <tr><th>ID</th><th>Tanggal</th><th>Jam</th><th>Perangkat</th><th>Browser</th></tr>
              </thead>
              <tbody>
                ${visitsSorted.length === 0 ? '' : visitsSorted.map(v => `
                  <tr>
                    <td>${v.id}</td><td>${v.tanggal}</td><td>${v.jam}</td><td>${v.device}</td><td>${v.browser}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          ${visitsSorted.length === 0 ? `<div class="empty-state">Belum ada kunjungan tercatat.</div>` : ''}
        </div>
      `}
    </div>
  `;

  document.getElementById('backFormBtn').onclick = () => { currentView = 'form'; render(); };
  document.getElementById('tabDaftar').onclick = () => { adminTab = 'daftar'; editingId = null; renderAdmin(); };
  document.getElementById('tabKunjungan').onclick = () => { adminTab = 'kunjungan'; renderAdmin(); };

  if(adminTab === 'daftar'){
    document.getElementById('searchNama').oninput = (e) => { searchNama = e.target.value; renderAdmin(); };
    document.getElementById('searchHp').oninput = (e) => { searchHp = e.target.value.replace(/[^0-9]/g,''); renderAdmin(); };
    document.getElementById('exportBtn').onclick = () => exportExcel(all);

    filtered.forEach(r => {
      const editBtn = document.getElementById('edit-' + r.id);
      const delBtn = document.getElementById('del-' + r.id);
      if(editBtn) editBtn.onclick = () => { editingId = r.id; renderAdmin(); };
      if(delBtn) delBtn.onclick = () => handleDelete(r.id, all);

      if(editingId === r.id){
        document.getElementById('save-' + r.id).onclick = () => handleSave(r.id, all);
        document.getElementById('cancel-' + r.id).onclick = () => { editingId = null; renderAdmin(); };
      }
    });
  } else {
    document.getElementById('clearLogBtn').onclick = async () => {
      if(!confirm('Hapus seluruh log kunjungan? Tindakan ini tidak bisa dibatalkan.')) return;
      await clearVisitLogs();
      renderAdmin();
    };
  }
}

function rowHtml(r){
  if(editingId === r.id){
    return `
      <tr>
        <td>${r.id}</td>
        <td><input type="text" id="edit-nama-${r.id}" value="${escapeHtml(r.nama)}"></td>
        <td><input type="text" id="edit-hp-${r.id}" value="${escapeHtml(r.hp)}" inputmode="numeric"></td>
        <td>${r.tanggal}</td>
        <td>${r.jam}</td>
        <td>
          <div class="row-actions">
            <button class="icon-btn success" id="save-${r.id}" title="Simpan">${svgSave}</button>
            <button class="icon-btn" id="cancel-${r.id}" title="Batal">${svgX}</button>
          </div>
        </td>
      </tr>
    `;
  }
  return `
    <tr>
      <td>${r.id}</td>
      <td>${escapeHtml(r.nama)}</td>
      <td>${escapeHtml(r.hp)}</td>
      <td>${r.tanggal}</td>
      <td>${r.jam}</td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" id="edit-${r.id}" title="Edit">${svgEdit}</button>
          <button class="icon-btn danger" id="del-${r.id}" title="Hapus">${svgTrash}</button>
        </div>
      </td>
    </tr>
  `;
}

async function handleSave(id, all){
  const namaVal = document.getElementById('edit-nama-' + id).value.trim();
  const hpVal = document.getElementById('edit-hp-' + id).value.trim().replace(/[^0-9]/g,'');
  if(!namaVal || hpVal.length < 10 || hpVal.length > 15){
    alert('Data tidak valid. Nama tidak boleh kosong dan Nomor HP harus 10–15 digit angka.');
    return;
  }
  await updateRegistration(id, namaVal, hpVal);
  editingId = null;
  renderAdmin();
}

async function handleDelete(id, all){
  if(!confirm('Hapus data pendaftar ini?')) return;
  await deleteRegistration(id);
  renderAdmin();
}

function exportExcel(list){
  if(list.length === 0){ alert('Belum ada data untuk diunduh.'); return; }
  const rows = list.map(r => ({
    ID: r.id, Nama: r.nama, 'Nomor HP': r.hp, Tanggal: r.tanggal, Jam: r.jam
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:26},{wch:18},{wch:14},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pendaftar');
  XLSX.writeFile(wb, 'Salis_Badminton_Club_Data.xlsx');
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

render();
logVisit();
</script>
